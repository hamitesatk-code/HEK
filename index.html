<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>HEK</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Courier New', monospace; padding: 16px; position: relative; overflow: hidden; }
    .grid-bg { position: fixed; inset: 0; pointer-events: none; background-image: linear-gradient(rgba(0,255,180,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,180,0.03) 1px, transparent 1px); background-size: 40px 40px; }
    .glow { position: fixed; top: 30%; left: 50%; transform: translateX(-50%); width: 500px; height: 300px; background: radial-gradient(ellipse, rgba(0,255,180,0.06) 0%, transparent 70%); pointer-events: none; }
    .container { width: 100%; max-width: 680px; display: flex; flex-direction: column; position: relative; z-index: 1; }
    .header { border: 1px solid rgba(0,255,180,0.25); border-bottom: none; border-radius: 4px 4px 0 0; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,255,180,0.03); }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo { font-size: 26px; font-weight: 900; color: #00ffb4; letter-spacing: 8px; text-shadow: 0 0 30px rgba(0,255,180,0.8); }
    .divider { width: 1px; height: 28px; background: rgba(0,255,180,0.2); }
    .subtitle { color: rgba(0,255,180,0.5); font-size: 10px; letter-spacing: 3px; }
    .status { display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #00ffb4; box-shadow: 0 0 10px #00ffb4; transition: all 0.3s; }
    .dot.loading { background: #ffb400; box-shadow: 0 0 10px #ffb400; animation: pulse 1s infinite; }
    .status-text { color: rgba(0,255,180,0.4); font-size: 10px; letter-spacing: 2px; }
    .messages { border: 1px solid rgba(0,255,180,0.15); border-top: none; border-bottom: none; background: rgba(0,0,0,0.6); min-height: 380px; max-height: 55vh; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; }
    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; min-height: 300px; gap: 24px; text-align: center; }
    .welcome-title { font-size: 12px; color: rgba(0,255,180,0.4); letter-spacing: 4px; margin-bottom: 6px; }
    .welcome-sub { font-size: 12px; color: rgba(255,255,255,0.2); letter-spacing: 1px; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 420px; }
    .suggestion-btn { background: transparent; border: 1px solid rgba(0,255,180,0.2); border-radius: 2px; color: rgba(0,255,180,0.6); padding: 8px 14px; font-size: 11px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .message-wrap { display: flex; flex-direction: column; gap: 4px; }
    .message-wrap.user { align-items: flex-end; }
    .message-wrap.assistant { align-items: flex-start; }
    .msg-label { font-size: 10px; letter-spacing: 2px; }
    .message-wrap.user .msg-label { color: rgba(0,200,255,0.4); }
    .message-wrap.assistant .msg-label { color: rgba(0,255,180,0.4); }
    .bubble { max-width: 82%; padding: 12px 16px; border-radius: 2px; font-size: 13px; line-height: 1.7; white-space: pre-wrap; letter-spacing: 0.3px; }
    .bubble.user { background: rgba(0,200,255,0.08); border: 1px solid rgba(0,200,255,0.2); color: rgba(200,240,255,0.9); }
    .bubble.assistant { background: rgba(0,255,180,0.05); border: 1px solid rgba(0,255,180,0.15); color: rgba(200,255,230,0.9); }
    .typing { display: flex; gap: 6px; align-items: center; padding: 12px 16px; border: 1px solid rgba(0,255,180,0.15); border-radius: 2px; background: rgba(0,255,180,0.05); width: fit-content; }
    .typing-dot { width: 6px; height: 6px; background: #00ffb4; border-radius: 50%; box-shadow: 0 0 6px #00ffb4; animation: blink 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.3s; }
    .typing-dot:nth-child(3) { animation-delay: 0.6s; }
    .input-area { border: 1px solid rgba(0,255,180,0.25); border-top: 1px solid rgba(0,255,180,0.1); border-radius: 0 0 4px 4px; padding: 14px 18px; display: flex; gap: 10px; align-items: flex-end; background: rgba(0,255,180,0.02); }
    .prompt-symbol { font-size: 16px; color: rgba(0,255,180,0.4); letter-spacing: 2px; padding-bottom: 11px; flex-shrink: 0; }
    textarea { flex: 1; background: transparent; border: none; color: rgba(200,255,230,0.9); font-size: 13px; font-family: inherit; letter-spacing: 0.5px; resize: none; outline: none; line-height: 1.6; max-height: 100px; overflow-y: auto; }
    textarea::placeholder { color: rgba(0,255,180,0.15); }
    .send-btn { background: transparent; border: 1px solid rgba(0,255,180,0.5); border-radius: 2px; color: #00ffb4; padding: 8px 14px; font-size: 11px; letter-spacing: 2px; cursor: pointer; font-family: inherit; transition: all 0.2s; flex-shrink: 0; }
    .send-btn:disabled { border-color: rgba(0,255,180,0.1); color: rgba(0,255,180,0.2); cursor: not-allowed; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.3 } }
    @keyframes blink { 0%,100% { opacity:0.2 } 50% { opacity:1 } }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow"></div>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <div class="logo">HEK</div>
        <div class="divider"></div>
        <div class="subtitle">KİŞİSEL ASİSTAN</div>
      </div>
      <div class="status">
        <div class="dot" id="statusDot"></div>
        <div class="status-text" id="statusText">AKTİF</div>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div>
          <div class="welcome-title">HOŞ GELDİN, HAMİT</div>
          <div class="welcome-sub">Ne sormak istiyorsun?</div>
        </div>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="quickSend(this)">Bugün ne yapmalıyım?</button>
          <button class="suggestion-btn" onclick="quickSend(this)">Bana motivasyon ver</button>
          <button class="suggestion-btn" onclick="quickSend(this)">Bir şey öğretmek istiyorum</button>
          <button class="suggestion-btn" onclick="quickSend(this)">Sana bir sorum var</button>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="prompt-symbol">›</div>
      <textarea id="input" placeholder="Sorunuzu yazın..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>GÖNDER</button>
    </div>
  </div>
  <script>
    const SYSTEM = `Sen "HEK" adında kişisel bir yapay zeka asistanısın. Kullanıcının adı Hamit. Türkçe konuş, öz ve net cevaplar ver.`;
    let messages = [];
    let loading = false;
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    inputEl.addEventListener('input', () => { sendBtn.disabled = !inputEl.value.trim() || loading; });
    function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
    function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendMessage(); } }
    function quickSend(btn) { inputEl.value = btn.textContent; sendMessage(); }
    function setLoading(val) { loading = val; sendBtn.disabled = val || !inputEl.value.trim(); statusDot.className = 'dot' + (val ? ' loading' : ''); statusText.textContent = val ? 'İŞLİYOR' : 'AKTİF'; }
    function addMessage(role, content) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();
      const wrap = document.createElement('div'); wrap.className = `message-wrap ${role}`;
      const label = document.createElement('div'); label.className = 'msg-label'; label.textContent = role === 'user' ? 'HAMİT' : 'HEK';
      const bubble = document.createElement('div'); bubble.className = `bubble ${role}`; bubble.textContent = content;
      wrap.appendChild(label); wrap.appendChild(bubble); messagesEl.appendChild(wrap); messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    function showTyping() {
      const welcome = document.getElementById('welcome'); if (welcome) welcome.remove();
      const wrap = document.createElement('div'); wrap.className = 'message-wrap assistant'; wrap.id = 'typing';
      const label = document.createElement('div'); label.className = 'msg-label'; label.textContent = 'HEK';
      const typing = document.createElement('div'); typing.className = 'typing';
      typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      wrap.appendChild(label); wrap.appendChild(typing); messagesEl.appendChild(wrap); messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }
    async function sendMessage() {
      const text = inputEl.value.trim(); if (!text || loading) return;
      messages.push({ role: 'user', content: text }); addMessage('user', text);
      inputEl.value = ''; inputEl.style.height = 'auto'; setLoading(true); showTyping();
      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
          body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: SYSTEM, messages: messages })
        });
        const data = await res.json();
        const reply = data.content?.[0]?.text || 'Bir hata oluştu.';
        messages.push({ role: 'assistant', content: reply }); removeTyping(); addMessage('assistant', reply);
      } catch(e) { removeTyping(); addMessage('assistant', 'Hata: ' + e.message); }
      finally { setLoading(false); inputEl.focus(); }
    }
  </script>
</body>
</html>
